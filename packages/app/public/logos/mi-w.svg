<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mumbai Indians Women - Trident with W marker -->
  <defs>
    <linearGradient id="miw-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#004BA0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="url(#miw-grad)"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
  <!-- Trident (slightly smaller to make room for W) -->
  <g transform="translate(32,28)">
    <!-- Main shaft -->
    <rect x="-2" y="-6" width="4" height="20" rx="1" fill="#D4AF37"/>
    <!-- Center prong -->
    <path d="M-2,-6 L-3,-13 L0,-18 L3,-13 L2,-6 Z" fill="#D4AF37"/>
    <!-- Left prong -->
    <path d="M-2,-6 L-5,-8 L-10,-16 L-7,-14 L-4,-8 Z" fill="#D4AF37"/>
    <!-- Right prong -->
    <path d="M2,-6 L5,-8 L10,-16 L7,-14 L4,-8 Z" fill="#D4AF37"/>
    <!-- Prong tips -->
    <circle cx="0" cy="-18" r="1.8" fill="#FFD700"/>
    <circle cx="-10" cy="-16" r="1.5" fill="#FFD700"/>
    <circle cx="10" cy="-16" r="1.5" fill="#FFD700"/>
    <!-- Cross guard -->
    <rect x="-7" y="-6" width="14" height="2.5" rx="1" fill="#D4AF37"/>
  </g>
  <!-- W badge at bottom -->
  <circle cx="32" cy="50" r="7" fill="#D4AF37"/>
  <path d="M27,47 L29,53 L32,49 L35,53 L37,47" fill="none" stroke="#004BA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>