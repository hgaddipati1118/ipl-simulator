<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lucknow Super Giants - Giant/Superhero motif -->
  <defs>
    <linearGradient id="lsg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C83070"/>
      <stop offset="100%" stop-color="#A72056"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="url(#lsg-grad)"/>
  <!-- Superhero/Giant figure silhouette -->
  <g transform="translate(32,30)">
    <!-- Broad shoulders/torso - power stance -->
    <path d="M-14,4 L-20,0 L-18,-8 L-8,-14 L0,-16 L8,-14 L18,-8 L20,0 L14,4 Z" fill="#FFF" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="7" fill="#FFF" opacity="0.9"/>
    <!-- Cape flowing -->
    <path d="M-14,4 Q-20,14 -22,24 Q-16,20 -10,10 Z" fill="#FFF" opacity="0.3"/>
    <path d="M14,4 Q20,14 22,24 Q16,20 10,10 Z" fill="#FFF" opacity="0.3"/>
    <!-- Chest emblem - star -->
    <polygon points="0,-8 2,-3 7,-3 3,0 4,5 0,2 -4,5 -3,0 -7,-3 -2,-3" fill="#A72056"/>
    <!-- Fists -->
    <circle cx="-20" cy="0" r="3.5" fill="#FFF" opacity="0.9"/>
    <circle cx="20" cy="0" r="3.5" fill="#FFF" opacity="0.9"/>
    <!-- Belt -->
    <rect x="-12" y="2" width="24" height="3" rx="1" fill="#FFD700" opacity="0.7"/>
    <!-- Legs power stance -->
    <path d="M-8,4 L-10,20 L-6,20 L-4,8 Z" fill="#FFF" opacity="0.7"/>
    <path d="M8,4 L10,20 L6,20 L4,8 Z" fill="#FFF" opacity="0.7"/>
  </g>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#FFF" stroke-width="1" opacity="0.3"/>
</svg>